# LilyGO T-Embed CC1101 Proflame2 ESPHome example
#
# Do not start by copying this file over a blank YAML file.
#
# Recommended setup order:
#
# 1. In ESPHome Builder, create a new ESP32 device first.
#    ESPHome will create a local YAML file and local secrets for Wi-Fi,
#    API encryption, and OTA updates.
#
# 2. Keep the generated device identity and connection blocks:
#    - esphome:
#    - wifi:
#    - api:
#    - ota:
#    - logger:
#
#    Do not replace the generated API encryption key or OTA password with
#    Proflame2-specific secret names. Those keys belong to your local ESPHome
#    installation.
#
# 3. Replace the generated esp32: block with the LilyGO target below.
#
# 4. Add one packages: block below.
#
# 5. Build and deploy from ESPHome Builder.
#
# 6. In Home Assistant, add/configure the Proflame2 integration, select the
#    LilyGO CC1101 backend, and link it to this ESPHome device.
#
# ESPHome's getting-started guide is the best reference for creating the base
# device in ESPHome Builder:
# https://esphome.io/guides/getting_started_hassio/

substitutions:
  # You may keep the name/friendly_name generated by ESPHome Builder instead.
  name: lilygo-proflame2
  friendly_name: LilyGO Proflame2

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  comment: Proflame2 LilyGO T-Embed CC1101 firmware

# Required LilyGO T-Embed CC1101 target.
# ESPHome Builder may generate a different board/framework. Replace it with this.
esp32:
  board: esp32-s3-devkitc-1
  framework:
    type: arduino

# Keep your ESPHome-generated blocks here.
# The exact secret names are local to your ESPHome installation.
#
# api:
#   encryption:
#     key: !secret <generated_api_encryption_key>
#
# ota:
#   - platform: esphome
#     password: !secret <generated_ota_password>
#
# wifi:
#   ssid: !secret wifi_ssid
#   password: !secret wifi_password
#
# logger:

# Optional but recommended so HA can restart the ESPHome node.
switch:
  - platform: restart
    name: Restart

# Production Proflame2 firmware packages.
#
# Recommended for normal users after releases are tagged:
#
# packages:
#   proflame2_tembed_base: github://jeffgregx2/HACS-Proflame2/esphome/packages/proflame2_tembed_base.yaml@<release-or-branch>
#   proflame2_tembed_display: github://jeffgregx2/HACS-Proflame2/esphome/packages/proflame2_tembed_display.yaml@<release-or-branch>
#
# Local checkout form for development or manual sync into ESPHome:
packages:
  proflame2_tembed_base: !include ../packages/proflame2_tembed_base.yaml
  proflame2_tembed_display: !include ../packages/proflame2_tembed_display.yaml

# Debug firmware is intentionally not enabled by default.
# Uncomment only when troubleshooting low-level RF/FIFO behavior.
#
#   proflame2_tembed_debug: github://jeffgregx2/HACS-Proflame2/esphome/packages/proflame2_tembed_debug.yaml@<release-or-branch>
#
# For local checkout development, add this to the existing packages block:
#
#   proflame2_tembed_debug: !include ../packages/proflame2_tembed_debug.yaml
