# Primary production LVGL UI for the LilyGO T-Embed CC1101.
#
# The display preset and working LVGL rotation remain unchanged. This file only
# defines the production-oriented widget tree.

lvgl:
  displays:
    - proflame2_display_tft
  color_depth: 16
  rotation: 270
  widgets:
    - obj:
        id: proflame2_ui_root
        width: 100%
        height: 100%
        pad_all: 4
        radius: 0
        border_width: 0
        bg_color: 0x05080F
        scrollbar_mode: "OFF"
        layout:
          type: FLEX
          flex_flow: COLUMN
          flex_align_main: START
          flex_align_cross: START
          pad_row: 6
        widgets:
          - obj:
              id: proflame2_ui_header
              width: 100%
              height: 30
              pad_left: 6
              pad_right: 6
              pad_top: 3
              pad_bottom: 3
              radius: 0
              border_width: 1
              border_color: 0x6F8597
              bg_color: 0x111823
              scrollbar_mode: "OFF"
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: START
                flex_align_cross: CENTER
              widgets:
                - obj:
                    width: 66
                    height: 100%
                    pad_all: 0
                    radius: 0
                    border_width: 0
                    bg_opa: 0%
                    scrollbar_mode: "OFF"
                    layout:
                      type: FLEX
                      flex_flow: ROW
                      flex_align_main: START
                      flex_align_cross: CENTER
                    widgets:
                      - label:
                          id: proflame2_header_name
                          width: 64
                          text_font: montserrat_16
                          text_color: 0xFFFFFF
                          text_align: LEFT
                          long_mode: DOT
                          text: "${proflame2_display_short_name}"
                - obj:
                    flex_grow: 1
                    height: 100%
                    pad_all: 0
                    pad_left: 2
                    radius: 0
                    border_width: 0
                    bg_opa: 0%
                    scrollbar_mode: "OFF"
                    layout:
                      type: FLEX
                      flex_flow: ROW
                      flex_align_main: CENTER
                      flex_align_cross: CENTER
                    widgets:
                      - obj:
                          id: proflame2_header_mode_badge
                          width: 76
                          height: 22
                          pad_all: 0
                          radius: 2
                          border_width: 1
                          border_color: 0xF2C94C
                          bg_color: 0x5B4512
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: CENTER
                            flex_align_cross: CENTER
                          widgets:
                            - label:
                                id: proflame2_header_mode
                                pad_top: 3
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: CENTER
                                long_mode: CLIP
                                text: "READY"
                - obj:
                    width: 124
                    height: 100%
                    pad_all: 0
                    radius: 0
                    border_width: 0
                    bg_opa: 0%
                    scrollbar_mode: "OFF"
                    layout:
                      type: FLEX
                      flex_flow: ROW
                      flex_align_main: END
                      flex_align_cross: CENTER
                      pad_column: 4
                    widgets:
                      - obj:
                          width: 43
                          height: 100%
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_opa: 0%
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: END
                            flex_align_cross: CENTER
                            pad_column: 2
                          widgets:
                            - image:
                                src: proflame2_header_battery_icon
                                image_recolor: 0xF4F7FA
                                image_recolor_opa: 100%
                            - label:
                                id: proflame2_header_battery_value
                                text_font: montserrat_12
                                text_color: 0xF4F7FA
                                text: "--%"
                      - obj:
                          width: 26
                          height: 100%
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_opa: 0%
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: END
                            flex_align_cross: CENTER
                            pad_column: 2
                          widgets:
                            - image:
                                src: proflame2_header_wifi_icon
                                image_recolor: 0xF4F7FA
                                image_recolor_opa: 100%
                            - label:
                                id: proflame2_header_wifi_value
                                text_font: montserrat_12
                                text_color: 0xF4F7FA
                                text: "--"
                      - obj:
                          width: 37
                          height: 100%
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_opa: 0%
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: END
                            flex_align_cross: CENTER
                            pad_column: 2
                          widgets:
                            - image:
                                src: proflame2_header_api_icon
                                image_recolor: 0xF4F7FA
                                image_recolor_opa: 100%
                            - label:
                                id: proflame2_header_api_value
                                text_font: montserrat_12
                                text_color: 0xF4F7FA
                                text: "--"
          - obj:
              id: proflame2_ui_body
              width: 100%
              flex_grow: 1
              pad_all: 0
              radius: 0
              border_width: 0
              bg_opa: 0%
              scrollbar_mode: "OFF"
              layout:
                type: FLEX
                flex_flow: ROW
                flex_align_main: START
                flex_align_cross: START
                pad_column: 6
              widgets:
                - obj:
                    id: proflame2_ui_left_panel
                    width: 194
                    height: 100%
                    pad_all: 6
                    radius: 0
                    border_width: 2
                    border_color: 0x6F8597
                    bg_color: 0x0B1018
                    scrollbar_mode: "OFF"
                    layout:
                      type: FLEX
                      flex_flow: COLUMN
                      flex_align_main: START
                      flex_align_cross: START
                      pad_row: 6
                    widgets:
                      - obj:
                          width: 100%
                          height: 22
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_color: 0x202A36
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: CENTER
                            flex_align_cross: CENTER
                          widgets:
                            - label:
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: CENTER
                                text: "STATUS"
                      - obj:
                          width: 100%
                          height: 24
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_opa: 0%
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: START
                            flex_align_cross: CENTER
                          widgets:
                            - label:
                                width: 46
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xDCE3EA
                                text: "Power"
                            - label:
                                id: proflame2_power_value
                                width: 16
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: RIGHT
                                text: "--"
                            - obj:
                                width: 4
                                height: 1
                                border_width: 0
                                bg_opa: 0%
                                scrollbar_mode: "OFF"
                            - label:
                                width: 46
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xDCE3EA
                                text: "Light"
                            - label:
                                id: proflame2_light_value
                                width: 16
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: RIGHT
                                text: "--"
                      - obj:
                          width: 100%
                          height: 24
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_opa: 0%
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: START
                            flex_align_cross: CENTER
                          widgets:
                            - label:
                                width: 46
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xDCE3EA
                                text: "Flame"
                            - label:
                                id: proflame2_flame_value
                                width: 16
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: RIGHT
                                text: "--"
                            - obj:
                                width: 4
                                height: 1
                                border_width: 0
                                bg_opa: 0%
                                scrollbar_mode: "OFF"
                            - label:
                                width: 46
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xDCE3EA
                                text: "Pilot"
                            - label:
                                id: proflame2_pilot_value
                                width: 16
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: RIGHT
                                text: "--"
                      - obj:
                          width: 100%
                          height: 24
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_opa: 0%
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: START
                            flex_align_cross: CENTER
                          widgets:
                            - label:
                                width: 46
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xDCE3EA
                                text: "Fan"
                            - label:
                                id: proflame2_fan_value
                                width: 16
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: RIGHT
                                text: "--"
                            - obj:
                                width: 4
                                height: 1
                                border_width: 0
                                bg_opa: 0%
                                scrollbar_mode: "OFF"
                            - label:
                                width: 46
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xDCE3EA
                                text: "Therm"
                            - label:
                                id: proflame2_therm_value
                                width: 16
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: RIGHT
                                text: "--"
                      - obj:
                          width: 100%
                          height: 24
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_opa: 0%
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: START
                            flex_align_cross: CENTER
                          widgets:
                            - label:
                                width: 46
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xDCE3EA
                                text: "Front"
                            - label:
                                id: proflame2_front_value
                                width: 16
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: RIGHT
                                text: "--"
                            - obj:
                                width: 4
                                height: 1
                                border_width: 0
                                bg_opa: 0%
                                scrollbar_mode: "OFF"
                            - label:
                                width: 46
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xDCE3EA
                                text: "Aux"
                            - label:
                                id: proflame2_aux_value
                                width: 16
                                long_mode: CLIP
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: RIGHT
                                text: "--"
                - obj:
                    id: proflame2_ui_right_panel
                    width: 112
                    height: 100%
                    pad_all: 6
                    radius: 0
                    border_width: 2
                    border_color: 0x6F8597
                    bg_color: 0x0B1018
                    scrollbar_mode: "OFF"
                    layout:
                      type: FLEX
                      flex_flow: COLUMN
                      flex_align_main: START
                      flex_align_cross: START
                      pad_row: 6
                    widgets:
                      - obj:
                          width: 100%
                          height: 22
                          pad_all: 0
                          radius: 0
                          border_width: 0
                          bg_color: 0x202A36
                          scrollbar_mode: "OFF"
                          layout:
                            type: FLEX
                            flex_flow: ROW
                            flex_align_main: CENTER
                            flex_align_cross: CENTER
                          widgets:
                            - label:
                                id: proflame2_right_panel_title
                                text_font: montserrat_12
                                text_color: 0xFFFFFF
                                text_align: CENTER
                                text: "ACTIVITY"
                      - label:
                          id: proflame2_right_panel_row1_label
                          width: 100%
                          text_font: montserrat_12
                          text_color: 0xDCE3EA
                          text: "Last Action"
                      - label:
                          id: proflame2_activity_action_value
                          width: 100%
                          text_font: montserrat_14
                          text_color: 0xFFFFFF
                          long_mode: DOT
                          text: "none"
                      - label:
                          id: proflame2_right_panel_row2_label
                          width: 100%
                          text_font: montserrat_12
                          text_color: 0xDCE3EA
                          text: "Result"
                      - label:
                          id: proflame2_activity_result_value
                          width: 100%
                          text_font: montserrat_14
                          text_color: 0xFFFFFF
                          long_mode: DOT
                          text: "--"
                      - label:
                          id: proflame2_right_panel_row3_label
                          width: 100%
                          text_font: montserrat_12
                          text_color: 0xDCE3EA
                          text: "Age"
                      - label:
                          id: proflame2_activity_age_value
                          width: 100%
                          text_font: montserrat_12
                          text_color: 0xFFFFFF
                          text: "just now"
