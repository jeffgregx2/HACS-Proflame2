[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    -ra
    --strict-markers
    -m "not hardware"
    --cov=custom_components/proflame2
    --cov-report=term-missing
    --cov-report=xml:/tmp/proflame2-coverage.xml
markers =
    ha: Home Assistant integration/config-flow tests.
    hardware: Tests that require physical RF hardware and are excluded by default.
    protocol: Pure protocol/unit tests that do not require Home Assistant or hardware.
    slow: Expensive offline replay/batch regression tests excluded from the fast default path.
