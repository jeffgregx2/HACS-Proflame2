name: ESPHome Validation

on:
  pull_request:
  push:
    branches:
      - dev
      - main

jobs:
  esphome-validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ESPHome validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-esphome.txt

      - name: Validate ESPHome config
        run: python -m esphome config esphome/examples/lilygo_cc1101_example.yaml

      - name: Compile ESPHome example
        run: python -m esphome compile esphome/examples/lilygo_cc1101_example.yaml

      - name: Remove generated firmware outputs
        if: always()
        run: |
          rm -rf .esphome
          rm -rf esphome/.esphome
          rm -rf esphome/examples/.esphome
          rm -f esphome/examples/.gitignore
          find esphome -type d \( -name ".esphome" -o -name "build" -o -name ".pioenvs" -o -name ".piolibdeps" \) -prune -exec rm -rf {} +
